<svg width="1717" height="1079" viewBox="0 0 1717 1079" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AICron Agent Prompt 工作台</title>
  <desc id="desc">AICron README 顶部视觉图，展示 Agent 任务 Prompt 持续执行、进度可见和结果复盘。</desc>
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" stroke="#e7dfd1" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#201c16" flood-opacity="0.14"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#201c16" flood-opacity="0.10"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .serif { font-family: Georgia, "Times New Roman", "Songti SC", "SimSun", serif; }
      .ink { fill: #24221e; }
      .muted { fill: #70695d; }
      .accent { fill: #c15412; }
      .line { stroke: #ded4c4; }
      .panel { fill: #fffdf8; stroke: #ded4c4; }
      .topbar { fill: #15130f; }
      .pill { fill: #f3e4d8; }
      .green { fill: #dff1e7; }
      .greenText { fill: #2d8b55; }
    </style>
  </defs>

  <rect width="1717" height="1079" fill="#f4efe6"/>
  <rect width="1717" height="1079" fill="url(#grid)" opacity="0.72"/>

  <g class="sans">
    <text x="63" y="76" class="ink" font-size="30" font-weight="800">AICron</text>
    <text x="168" y="76" class="muted" font-size="18" font-weight="600">Agent Prompt 工作台</text>
    <text x="1295" y="72" class="muted" font-size="20" font-weight="600">从 Prompt 沉淀到调度执行，再到历史复盘</text>
  </g>

  <g transform="translate(63 218)">
    <text class="sans accent" x="0" y="14" font-size="16" font-weight="700" letter-spacing="1.5">研究员工作台</text>
    <text class="serif ink" x="0" y="136" font-size="112" font-weight="700">让 Agent 任务</text>
    <text class="serif ink" x="0" y="248" font-size="112" font-weight="700">Prompt 持续</text>
    <text class="serif ink" x="0" y="360" font-size="112" font-weight="700">执行。</text>

    <text class="sans muted" x="0" y="442" font-size="27" font-weight="600">AICron 管理那些从聊天、研究和复盘中沉淀出来的可复用</text>
    <text class="sans muted" x="0" y="486" font-size="27" font-weight="600">Prompt，并把它们封装成可调度、可追踪、可推送结果的</text>
    <text class="sans muted" x="0" y="530" font-size="27" font-weight="600">Agent 工作流。</text>

    <rect x="0" y="586" width="202" height="64" rx="8" fill="#24221e"/>
    <text class="sans" x="101" y="626" text-anchor="middle" fill="#fffdf8" font-size="22" font-weight="800">新建任务 Prompt</text>
    <rect x="218" y="586" width="168" height="64" rx="8" fill="#f9f4eb" stroke="#cfc2ae"/>
    <text class="sans ink" x="302" y="626" text-anchor="middle" font-size="22" font-weight="800">查看执行历史</text>

    <g transform="translate(0 690)">
      <line x1="0" y1="0" x2="224" y2="0" class="line"/>
      <line x1="242" y1="0" x2="466" y2="0" class="line"/>
      <line x1="484" y1="0" x2="708" y2="0" class="line"/>
      <text class="sans ink" x="0" y="42" font-size="24" font-weight="850">Prompt 资产化</text>
      <text class="sans muted" x="0" y="78" font-size="18" font-weight="600">持久上下文、核验标准和输</text>
      <text class="sans muted" x="0" y="108" font-size="18" font-weight="600">出格式，不再散落在聊天里。</text>
      <text class="sans ink" x="242" y="42" font-size="24" font-weight="850">进度可见</text>
      <text class="sans muted" x="242" y="78" font-size="18" font-weight="600">长任务看到阶段、耗时、错</text>
      <text class="sans muted" x="242" y="108" font-size="18" font-weight="600">误原因，而不是等黑盒。</text>
      <text class="sans ink" x="484" y="42" font-size="24" font-weight="850">结果可复盘</text>
      <text class="sans muted" x="484" y="78" font-size="18" font-weight="600">飞书摘要 + Markdown 附件</text>
      <text class="sans muted" x="484" y="108" font-size="18" font-weight="600">+ 时间线历史。</text>
    </g>
  </g>

